{% set name = "pybktree" %}
{% set version = "1.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pybktree-{{ version }}.tar.gz
  sha256: eec0037cdd3d7553e6d72435a4379bede64be17c6712f149e485169638154d2b

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - pybktree
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Jetsetter/pybktree
  summary: BK-tree data structure to allow fast querying of "close" matches
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - TomSmithCGAT
